<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>宿舍小帳本 · Dorm Ledger</title>
  <meta name="description" content="室友共用物品記帳，用一個加一，月底一次結清。">
  <meta name="theme-color" content="#F6F5F1">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg?v=2" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png?v=2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="宿舍小帳本">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="greeting">
      <h1><span id="appTitle">宿舍小帳本</span> <span class="wiggle">🥚</span></h1>
      <p id="subGreeting">大家一起用，月底一起算 ✨</p>
    </div>
    <div class="header-badge" id="headerBadge" hidden></div>
  </header>

  <main id="view" class="view"></main>

  <button id="fab" class="fab" aria-label="快速新增">＋</button>

  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="home">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5.5 10.5 9 4.5M18.5 10.5 15 4.5M3 10.5h18M4.5 10.5l1.6 8a2 2 0 0 0 2 1.5h7.8a2 2 0 0 0 2-1.5l1.6-8M9.5 14.5v2.5M14.5 14.5v2.5"/>
      </svg>
      <span class="tab-label">物品</span>
    </button>
    <button class="tab" data-tab="logs">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 3h14v18l-2.3-1.5L14.4 21l-2.4-1.5L9.6 21l-2.3-1.5L5 21V3zM9 8h6M9 12h6M9 16h3.5"/>
      </svg>
      <span class="tab-label">紀錄</span>
    </button>
    <button class="tab" data-tab="settle">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8.5"/>
        <path d="M14.8 9.3c-.5-.9-1.5-1.4-2.8-1.4-1.7 0-2.9.9-2.9 2.1 0 2.9 5.8 1.2 5.8 4.1 0 1.2-1.2 2.1-2.9 2.1-1.3 0-2.3-.5-2.8-1.4M12 6.2v11.6"/>
      </svg>
      <span class="tab-label">結算</span>
    </button>
    <button class="tab" data-tab="members">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11.5 12 3.5l9 8M5.5 9.5V20a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1V9.5M9.8 21v-5.5a1 1 0 0 1 1-1h2.4a1 1 0 0 1 1 1V21"/>
      </svg>
      <span class="tab-label">室友</span>
    </button>
  </nav>

  <div id="sheetRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="app.js"></script>
</body>
</html>
